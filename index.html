<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitale Kaart</title>

<style>
    body {
        margin: 0;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh; /* FIX */
        font-family: sans-serif;
        overflow: hidden;
        perspective: 1000px; 
    }

    #card {
        width: 90%;
        max-width: 400px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        transition: transform 0.6s;
        transform-style: preserve-3d;
    }

    img {
        width: 100%;
        display: block;
        backface-visibility: hidden;
    }

    .hint {
        position: absolute;
        bottom: 20px;
        text-align: center;
        width: 100%;
        font-size: 15px;
        color: #555;
        opacity: 1;
        animation: fadeOut 3s ease 3s forwards;
    }

    @keyframes fadeOut {
        to { opacity: 0; }
    }

    .flip {
        transform: rotateY(180deg);
    }
</style>
</head>

<body>

<div id="card">
    <img id="cardImage" src="voorkant.jpg" alt="kaart">
</div>

<div class="hint">Tik op het scherm om de kaart om te slaan</div>

<script>
    const images = [
        "voorkant.jpg",
        "linker.jpg",
        "rechter.jpg",
        "achter.jpg"
    ];

    let index = 0;

    document.addEventListener("click", () => {
        const card = document.getElementById("card");
        index = (index + 1) % images.length;

        card.classList.add("flip");

        setTimeout(() => {
            document.getElementById("cardImage").src = images[index];
        }, 300);

        setTimeout(() => {
            card.classList.remove("flip");
        }, 600);
    });
</script>

</body>
</html>
