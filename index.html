<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitale Kaart</title>

<style>
    body {
        margin: 0;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        overflow: hidden;
        perspective: 1200px;
    }

    #card {
        width: 90%;
        max-width: 400px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        transform-origin: left center;
        transition: transform 0.6s ease;
        background: white;
    }

    .single-image img {
        width: 100%;
        display: block;
    }

    .inside {
        display: flex;
        flex-direction: row;
        width: 100%;
    }

    .inside img {
        width: 50%;
        display: block;
    }

    .hint {
        position: absolute;
        bottom: 20px;
        text-align: center;
        width: 100%;
        font-size: 15px;
        color: #555;
        opacity: 1;
        animation: fadeOut 3s ease 3s forwards;
    }

    @keyframes fadeOut {
        to { opacity: 0; }
    }

    .hinge {
        transform: rotateY(-90deg);
    }
</style>
</head>

<body>

<div id="card">
    <div id="cardContent" class="single-image">
        <img src="voorkant.jpg" alt="">
    </div>
</div>

<div class="hint">Tik om de kaart om te slaan</div>

<script>
    const sequence = ["front", "inside", "back", "inside"];
    let index = 0;

    const card = document.getElementById("card");
    const cardContent = document.getElementById("cardContent");

    function renderState(state) {
        if (state === "front") {
            cardContent.className = "single-image";
            cardContent.innerHTML = '<img src="voorkant.jpg">';
        } else if (state === "back") {
            cardContent.className = "single-image";
            cardContent.innerHTML = '<img src="achter.jpg">';
        } else if (state === "inside") {
            cardContent.className = "inside";
            cardContent.innerHTML = `
                <img src="links.jpg">
                <img src="rechts.jpg">
            `;
        }
    }

    renderState(sequence[index]);

    document.addEventListener("click", () => {
        card.classList.add("hinge");

        setTimeout(() => {
            index = (index + 1) % sequence.length;
            renderState(sequence[index]);
        }, 300);

        setTimeout(() => {
            card.classList.remove("hinge");
        }, 600);
    });
</script>

</body>
</html>
