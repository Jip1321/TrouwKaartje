
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trouwkaart Boek</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #e6e6e6;
        perspective: 2000px;
        font-family: sans-serif;
        overflow: hidden;
    }

    .book {
        position: relative;
        width: min(70vh, 60vw);
        max-width: 95%;
        aspect-ratio: 3 / 2;
        transform-style: preserve-3d;
    }

    .page {
        position: absolute;
        width: 50%;
        height: 100%;
        top: 0;
        backface-visibility: hidden;
    }

    .page img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #front {
        width: 100%;
        transform-origin: left center;
        z-index: 10;
        box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    }

    #leftPage {
        left: 0;
        transform: translateX(0);
        transform-origin: right center;
        box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    }

    #rightPage {
        right: 0;
        transform: translateX(0);
        transform-origin: left center;
        box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    }

    #rightBack {
        right: 0;
        transform-origin: left center;
        transform: rotateY(180deg);
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

</style>
</head>

<body>

<div class="book">

    <div class="page" id="front">
        <img src="voorkant.jpg">
    </div>

    <div class="page" id="leftPage">
        <img src="links.jpg">
    </div>

    <div class="page" id="rightPage">
        <img src="rechts.jpg">
    </div>

    <div class="page" id="rightBack">
        <img src="achter.jpg">
    </div>

</div>

<script>
    let step = 0;

    document.addEventListener("click", () => {
        const front = document.getElementById("front");
        const rightPage = document.getElementById("rightPage");

        if (step === 0) {
            front.style.transition = "1.2s cubic-bezier(.55,.03,.41,1.39)";
            front.style.transform = "rotateY(-160deg) translateZ(8px) rotateX(3deg)";
            step = 1;
        } 
        else if (step === 1) {
            rightPage.style.transition = "1.2s cubic-bezier(.55,.03,.41,1.39)";
            rightPage.style.transform = "rotateY(-180deg) translateZ(8px) rotateX(3deg)";
            step = 2;
        }
        else if (step === 2) {
            rightPage.style.transform = "rotateY(0deg)";
            step = 3;
        }
        else if (step === 3) {
            front.style.transform = "rotateY(0deg)";
            step = 0;
        }
    });
</script>

</body>
</html>
