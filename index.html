
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trouwkaart</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #e6e6e6;
        font-family: sans-serif;
        overflow: hidden;
    }

    #card {
        width: min(70vh, 90vw);
        max-width: 95%;
        aspect-ratio: 3 / 4;
        position: relative;
    }

    #card img {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.8s ease;
    }

    #card img.active {
        opacity: 1;
    }

    .hint {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: #444;
        font-size: 16px;
        pointer-events: none;
    }
</style>
</head>

<body>

<div id="card">
    <img src="voorkant.jpg" class="active">
    <img src="links.jpg">
    <img src="rechts.jpg">
    <img src="achter.jpg">
</div>

<div class="hint">Tik om verder te gaan</div>

<script>
    const images = document.querySelectorAll("#card img");
    let index = 0;

    document.addEventListener("click", () => {
        images[index].classList.remove("active");
        index = (index + 1) % images.length;
        images[index].classList.add("active");
    });
</script>

</body>
</html>
