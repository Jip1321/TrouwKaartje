<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitale Kaart</title>

<style>
    body {
        margin: 0;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        overflow: hidden;
        perspective: 1600px;
    }

    #stack {
        position: relative;
        width: 90%;
        max-width: 420px;
        height: auto;
    }

    .card {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        transform-origin: left center;
        transition: transform 0.7s ease;
        backface-visibility: hidden;
    }

    .card img {
        width: 100%;
        display: block;
    }

    .hint {
        position: absolute;
        bottom: 20px;
        text-align: center;
        width: 100%;
        font-size: 15px;
        color: #555;
    }

    .flip {
        transform: rotateY(-180deg);
    }
</style>
</head>

<body>

<div id="stack">
    <div class="card"><img src="voorkant.jpg"></div>
    <div class="card"><img src="links.jpg"></div>
    <div class="card"><img src="rechts.jpg"></div>
    <div class="card"><img src="achter.jpg"></div>
</div>

<div class="hint">Tik om de kaart om te slaan</div>

<script>
    const cards = Array.from(document.querySelectorAll(".card"));

    function bringToBack(card) {
        card.style.transition = "none";
        card.classList.remove("flip");
        card.style.zIndex = 0;
        cards.push(cards.shift());
        setTimeout(() => {
            cards.forEach((c, i) => c.style.zIndex = cards.length - i);
            card.style.transition = "transform 0.7s ease";
        }, 50);
    }

    cards.forEach((c, i) => c.style.zIndex = cards.length - i);

    document.addEventListener("click", () => {
        const topCard = cards[0];
        topCard.classList.add("flip");
        setTimeout(() => bringToBack(topCard), 700);
    });
</script>

</body>
</html>
