<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trouwkaart Boek</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #e6e6e6;
        perspective: 2000px;
        font-family: sans-serif;
        overflow: hidden;
    }

    .book {
        position: relative;
        width: min(60vh, 50vw);
        max-width: 90%;
        aspect-ratio: 3 / 4;
        transform-style: preserve-3d;
    }

    .page {
        position: absolute;
        width: 100%;
        height: 100%;
        transform-origin: left center;
        backface-visibility: hidden;
        transition: transform 1.2s cubic-bezier(.55,.03,.41,1.39);
    }

    .page img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .hard {
        box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    }

    .soft {
        box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        border-radius: 2px 8px 8px 2px;
    }

    .back {
        transform: rotateY(180deg);
    }

    @media (max-width: 600px) {
        .book {
            width: 80vw;
            max-width: 95%;
        }
    }
</style>
</head>

<body>

<div class="book">

    <!-- 1: Voorkant -->
    <div class="page hard" id="p1">
        <img src="voorkant.jpg">
    </div>

    <!-- 2: Binnenkant links -->
    <div class="page soft" id="p2">
        <img src="links.jpg">
    </div>

    <!-- 3: Binnenkant rechts -->
    <div class="page soft" id="p3">
        <img src="rechts.jpg">
    </div>

    <!-- 4: Achterkant -->
    <div class="page hard back" id="p4">
        <img src="achter.jpg">
    </div>

</div>

<script>
    let step = 0;

    document.addEventListener("click", () => {
        const p1 = document.getElementById("p1");
        const p2 = document.getElementById("p2");
        const p3 = document.getElementById("p3");

        if (step === 0) {
            p1.style.transform = "rotateY(-160deg) translateZ(10px) rotateX(3deg)";
            step = 1;
        }
        else if (step === 1) {
            p3.style.transform = "rotateY(-160deg) translateZ(10px) rotateX(3deg)";
            step = 2;
        }
        else if (step === 2) {
            p3.style.transform = "rotateY(0deg)";
            step = 3;
        }
        else if (step === 3) {
            p1.style.transform = "rotateY(0deg)";
            step = 0;
        }
    });
</script>

</body>
</html>
